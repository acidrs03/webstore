# ── Handcraft Store — Docker Compose ─────────────────────────────────────────
# No build step — pulls the pre-built image from Docker Hub.
#
# SETUP (two steps):
#   1. Copy .env.example to .env and fill in your values.
#   2. docker compose up -d
#
# The container automatically seeds the database and creates the admin account
# on first start. Everything is ready once the health check passes (~60s).
#
# SSL:  Handled by Nginx Proxy Manager — point it at host port APP_PORT (default 5001).
#       Set BASE_URL to your https:// domain in .env first.
#
# MongoDB network: If your MongoDB container is on a named Docker network,
#   uncomment the external network block at the bottom and add it to the
#   app service's networks list.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Node.js application ────────────────────────────────────────────────────
  # On first start the container will:
  #   • Seed default categories, products, and settings
  #   • Create the admin account (from ADMIN_EMAIL / ADMIN_PASSWORD in .env)
  #   • Generate sitemap.xml and robots.txt
  #   • Start the web server
  # All steps are idempotent — safe to restart at any time.
  app:
    image: ${DOCKER_IMAGE:-webstore:latest}
    container_name: store_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - "${APP_PORT:-5001}:5001"
    volumes:
      - ${APPDATA_PATH:-/mnt/user/appdata/webstore}/uploads:/app/uploads
      - ${APPDATA_PATH:-/mnt/user/appdata/webstore}/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks: {}
  # ── External MongoDB network (uncomment if needed) ─────────────────────────
  # If your MongoDB container is on a named network (find with: docker network ls),
  # uncomment the lines below and add it to the app service's networks list.
  #
  # networks:
  #   your_mongo_network:
  #     external: true

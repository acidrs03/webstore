worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens   off;   # Never reveal nginx version

    # Max upload size — must match multer config (default 10 MB; set 20 MB for headroom)
    client_max_body_size 20M;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json
        application/xml application/rss+xml
        image/svg+xml font/woff font/woff2;

    # ── Rate-limiting zones ───────────────────────────────────────────────────
    # Admin login: max 10 attempts per minute per IP
    limit_req_zone $binary_remote_addr zone=login:10m    rate=10r/m;
    # General storefront: 60 req/s per IP (burst allows spikes)
    limit_req_zone $binary_remote_addr zone=general:10m  rate=60r/s;
    # Checkout/cart: tighter limit to reduce abuse
    limit_req_zone $binary_remote_addr zone=checkout:10m rate=20r/s;

    # ── Upstream Node.js app ──────────────────────────────────────────────────
    upstream app {
        server app:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Global security headers ───────────────────────────────────────────
        # NOTE: HSTS (Strict-Transport-Security) must be added in Unraid Nginx
        # Proxy Manager after SSL is configured — it is not set here because
        # this nginx only handles HTTP internally.
        add_header X-Frame-Options            "SAMEORIGIN"                       always;
        add_header X-Content-Type-Options     "nosniff"                          always;
        add_header X-XSS-Protection           "1; mode=block"                   always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;

        # ── Block hidden files / dot-files (.env, .git, etc.) ─────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── User-uploaded files — served directly by nginx ────────────────────
        # Nginx has a read-only volume mount of the uploads directory,
        # bypassing Node entirely for image delivery.
        location /uploads/ {
            alias  /app/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            # Only allow image and safe file types
            location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
                try_files $uri =404;
            }
            # Deny everything else in /uploads/
            deny all;
        }

        # ── SEO files — short TTL so regeneration takes effect quickly ────────
        location = /sitemap.xml {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            # Allow crawlers to cache for up to 24 hours; revalidate after
            add_header Cache-Control "public, max-age=86400, must-revalidate" always;
            access_log off;
        }

        location = /robots.txt {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            add_header Cache-Control "public, max-age=86400, must-revalidate" always;
            access_log off;
        }

        location = /favicon.ico {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            add_header Cache-Control "public, max-age=604800, immutable" always;
            access_log off;
            log_not_found off;
        }

        # ── Admin area — noindex + tighter rate limits ─────────────────────────
        location ^~ /admin {
            # Belt-and-suspenders: tell crawlers not to index admin pages
            # even if they somehow bypass robots.txt
            add_header X-Robots-Tag "noindex, nofollow" always;
            add_header X-Frame-Options "DENY" always;

            # Rate-limit the login page specifically
            location = /admin/login {
                limit_req zone=login burst=5 nodelay;
                proxy_pass http://app;
                proxy_http_version 1.1;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Connection        "";
            }

            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Stripe webhook — dedicated location, no rate limit ────────────────
        location = /webhooks/stripe {
            # Only Stripe calls this; block all crawlers and scanners
            add_header X-Robots-Tag "noindex, nofollow" always;
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_read_timeout 30s;
        }

        # ── Cart & checkout — tighter rate limit ──────────────────────────────
        location ~* ^/(cart|checkout) {
            add_header X-Robots-Tag "noindex, nofollow" always;
            limit_req zone=checkout burst=10 nodelay;
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── All other requests (storefront) ───────────────────────────────────
        location / {
            limit_req zone=general burst=30 nodelay;
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffer_size          128k;
            proxy_buffers              4 256k;
            proxy_busy_buffers_size    256k;
        }

        # ── Nginx-level health check (no app involvement) ─────────────────────
        location = /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
